<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Wishing Well</title>
    <meta
      name="description"
      content="Write a wish, toss it into a magical well, and discover wishes from around the world."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./css/well.css" />
  </head>
  <body>
    <main class="app" aria-label="Wishing Well interactive experience">
      <section class="scroll-journey" aria-label="Wishing Well depth journey">
        <div class="scroll-frame">
          <header class="top-ui">
            <h1>Wishing Well</h1>
            <p class="tagline">Make a wish. Let it drift.</p>
          </header>

          <div class="layer-stack" id="layerStack" aria-live="polite">
            <section class="well-layer layer-exterior is-active" data-layer="exterior" aria-label="Well exterior">
              <div class="well-iso" role="img" aria-label="Isometric stone wishing well">
                <div class="well-rim"></div>
                <div class="well-wall wall-front"></div>
                <div class="well-wall wall-left"></div>
                <div class="well-wall wall-right"></div>
                <div class="well-opening"></div>
              </div>
            </section>

            <section class="well-layer layer-opening" data-layer="opening" aria-label="Well opening depth">
              <div class="shaft-ring"></div>
            </section>

            <section class="well-layer layer-shaft" data-layer="shaft" aria-label="Well shaft interior">
              <div class="shaft-walls"></div>
              <canvas id="dustCanvas" class="fx-canvas fx-dust" aria-hidden="true"></canvas>
            </section>

            <section class="well-layer layer-water" data-layer="water" aria-label="Water surface at bottom of well">
              <canvas id="waterCanvas" class="fx-canvas fx-water" aria-label="Animated water surface"></canvas>
              <div class="boat-overlay" id="boatOverlay" aria-hidden="true"></div>
            </section>
          </div>
        </div>

        <div class="scroll-space" aria-hidden="true"></div>
      </section>

      <button class="wish-fab" id="openWishModal" type="button" aria-haspopup="dialog" aria-controls="wishModal">
        Make a Wish
      </button>
    </main>

    <div class="modal-backdrop" id="wishModal" hidden>
      <section class="modal" role="dialog" aria-modal="true" aria-labelledby="wishModalTitle">
        <button class="modal-close" id="closeWishModal" type="button" aria-label="Close">×</button>
        <h2 id="wishModalTitle">Write Your Wish</h2>
        <form id="wishForm">
          <label for="wishText" class="visually-hidden">Wish text</label>
          <textarea id="wishText" maxlength="200" placeholder="Whisper your wish..." required></textarea>
          <div class="form-row">
            <span id="wishCount" aria-live="polite">0 / 200</span>
            <button class="btn-primary" type="submit">Toss Coin</button>
          </div>
        </form>
      </section>
    </div>

    <div class="modal-backdrop" id="discoverModal" hidden>
      <section class="modal modal-discover" role="dialog" aria-modal="true" aria-labelledby="discoverTitle">
        <button class="modal-close" id="closeDiscoverModal" type="button" aria-label="Close">×</button>
        <h2 id="discoverTitle">A Wish from the Well</h2>
        <p id="discoverContent">Tap a boat to discover a wish.</p>
      </section>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
    <script src="./js/firebase.js"></script>
    <script type="module" src="./js/scroll.js"></script>
    <script type="module" src="./js/canvas.js"></script>
    <script type="module" src="./js/app.js"></script>
  </body>
</html>
