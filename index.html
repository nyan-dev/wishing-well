<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Wishing Well</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app">
      <h1>Wishing Well</h1>
      <p class="subtitle">Type a wish, toss a coin, and keep your wishes close.</p>

      <form id="wish-form" class="wish-form">
        <label for="wish-input">Your wish</label>
        <input id="wish-input" name="wish" maxlength="140" placeholder="I wish for..." required />
        <button type="submit">Toss Coin</button>
      </form>

      <p id="status" class="status" aria-live="polite"></p>

      <section>
        <h2>Saved Wishes</h2>
        <ul id="wish-list" class="wish-list"></ul>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
